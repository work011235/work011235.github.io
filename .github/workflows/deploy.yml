name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # fires on every push to main
  workflow_dispatch:  # allows manual trigger from the Actions tab

# Grant GITHUB_TOKEN the permissions needed for Pages deployment
permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5  # v4 is actually fine, but v5+ is better if available

      - name: Setup Node.js
        uses: actions/setup-node@v6  # Upgrade from @v4 to @v6
        with:
          node-version: 22          # Move from 20 to 22 (the stable LTS)
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build
        env:
          # This forces all background actions to use the Node 24 runtime
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/   # Astro outputs here by default

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
